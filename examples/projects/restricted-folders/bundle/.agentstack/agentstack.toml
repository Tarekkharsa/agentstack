version = 1

# ── This repo's "device structure": which folders are off-limits to agents ──
#
# `[policy.filesystem] deny` is a pure blocklist. Each glob is matched against a
# path's workspace-relative form, its absolute form, AND its bare file name, so
# `secrets/**` blocks `secrets/api-keys.env` whether the agent spells it
# relative or absolute. The effective deny set is the UNION of the machine
# manifest (~/.agentstack/agentstack.toml) and this project manifest — a repo
# can only ADD restrictions, never remove the machine's.
#
# NOTE (see README "Known limitation" + F1): today `agentstack guard check`
# enforces deny globs from the MACHINE layer only; a project-layer deny living
# at `.agentstack/agentstack.toml` is silently ignored. assert.sh therefore
# mirrors these three globs into the machine manifest so the guard actually
# blocks them, and includes an isolated probe that demonstrates the defect.
# Once F1 is fixed, this project declaration alone will enforce.
[policy.filesystem]
deny = [
  "secrets/**",        # API keys, service-account JSON — never read or written
  "personal-notes/**", # the maintainer's private diary
  "infra/prod/**",     # production Terraform — no agent edits to prod
]
