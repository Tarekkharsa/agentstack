name: conformance

# Adapter-rot alarm. Nightly (not on PRs): golden snapshots lock what we
# render; this proves the real CLIs on the other end still accept it. A red
# run here means a CLI changed its config schema under us — fix the adapter
# descriptor before users hit it.
on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # Re-run the full suite (incl. golden render snapshots for all 13 adapters)
  # against the latest stable toolchain, independent of push activity.
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Intentionally floating: `stable` is a branch ref with no resolvable tag.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test (golden renders + suite)
        run: cargo test --all

  # Install the real, current CLI from its registry and make it read the
  # config agentstack rendered (fenced HOME). Matrix covers the CLIs that are
  # headless-installable; the rest are covered structurally by `render`.
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - adapter: claude-code
            npm: "@anthropic-ai/claude-code"
            bin: claude
            config: .claude.json
          - adapter: codex
            npm: "@openai/codex"
            bin: codex
            config: .codex/config.toml
          - adapter: gemini
            npm: "@google/gemini-cli"
            bin: gemini
            config: .gemini/settings.json
          # pi has no MCP support by design — "-" switches the smoke to its
          # skills-render leg (symlinks under ~/.pi/agent/skills).
          - adapter: pi
            npm: "@mariozechner/pi-coding-agent"
            bin: pi
            config: "-"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Intentionally floating: `stable` is a branch ref with no resolvable tag.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: Build agentstack
        run: cargo build --release
      - name: Install ${{ matrix.npm }} (latest)
        run: npm install -g ${{ matrix.npm }}
      - name: Smoke ${{ matrix.adapter }}
        env:
          AGENTSTACK_BIN: ${{ github.workspace }}/target/release/agentstack
        run: ./examples/sandbox/conformance-smoke.sh ${{ matrix.adapter }} ${{ matrix.bin }} ${{ matrix.config }}
