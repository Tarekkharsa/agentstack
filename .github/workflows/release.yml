name: release

# Tag a release: `git tag v0.1.0 && git push --tags`
on:
  push:
    tags: ["v*"]

env:
  # Resilience against flaky crates.io fetches on the runners.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Intentionally floating: `stable` is a branch ref with no resolvable tag.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --features sandbox --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -e
          name="agentstack-${{ matrix.target }}"
          ext=""
          [[ "${{ matrix.os }}" == windows-latest ]] && ext=".exe"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/agentstack${ext}" "$name/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$name/" 2>/dev/null || true
          if [[ -n "$ext" ]]; then
            7z a "$name.zip" "$name" >/dev/null
          else
            tar czf "$name.tar.gz" "$name"
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agentstack-${{ matrix.target }}
          path: |
            agentstack-*.tar.gz
            agentstack-*.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: assets
        run: sha256sum agentstack-* > checksums.txt

      - name: Attest release binaries
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            assets/agentstack-*.tar.gz
            assets/agentstack-*.zip

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          draft: true
          files: |
            assets/agentstack-*.tar.gz
            assets/agentstack-*.zip
            assets/checksums.txt

  # The egress-proxy sidecar image `--lockdown` needs. The binary's compiled
  # default is this exact GHCR path pinned to its own crate version
  # (crates/cli/src/commands/sandbox.rs), and the runtime pulls it on first
  # use — so lockdown is zero-config with no env var and no extra secrets
  # (GHCR pushes with the built-in token; the package must be made PUBLIC once
  # after the first push — see RELEASING.md). A companion sandbox RUNNER image
  # is intentionally not published: it must carry the user's chosen harness
  # (see docker/sandbox.Dockerfile).
  egress-image:
    name: publish egress-proxy image (GHCR)
    needs: release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write   # push the egress-proxy sidecar image to GHCR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Tag must match the cli crate version
        # The binary compiled from this tag defaults to
        # ...egress-proxy:v<CARGO_PKG_VERSION>; a mismatched tag would ship
        # binaries pointing at an image this job never publishes.
        run: |
          version="$(grep -m1 '^version' crates/cli/Cargo.toml | cut -d'"' -f2)"
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != cli crate version v${version}" >&2
            exit 1
          fi
      - name: Lowercase owner (GHCR requires lowercase paths)
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/egress-proxy.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/agentstack-egress-proxy:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER_LC }}/agentstack-egress-proxy:latest

      - name: Attest egress-proxy image
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/${{ env.OWNER_LC }}/agentstack-egress-proxy
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Add immutable image digest to release notes
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          append_body: true
          # Without an explicit draft: true this update step would flip the
          # draft the `release` job created to published — silently defeating
          # the "review the draft, then publish" human gate.
          draft: true
          body: |
            Egress proxy image: `ghcr.io/${{ env.OWNER_LC }}/agentstack-egress-proxy@${{ steps.push.outputs.digest }}`
