name: release

# Tag a release: `git tag v0.1.0 && git push --tags`
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  # Resilience against flaky crates.io fetches on the runners.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -e
          name="agentstack-${{ matrix.target }}"
          ext=""
          [[ "${{ matrix.os }}" == windows-latest ]] && ext=".exe"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/agentstack${ext}" "$name/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$name/" 2>/dev/null || true
          if [[ -n "$ext" ]]; then
            7z a "$name.zip" "$name" >/dev/null
          else
            tar czf "$name.tar.gz" "$name"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: agentstack-${{ matrix.target }}
          path: |
            agentstack-*.tar.gz
            agentstack-*.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: assets
        run: sha256sum agentstack-* > checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            assets/agentstack-*.tar.gz
            assets/agentstack-*.zip
            assets/checksums.txt
