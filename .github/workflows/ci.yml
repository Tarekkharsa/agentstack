name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Resilience against flaky crates.io fetches (e.g. "HTTP2 framing layer"
  # errors on the runner): retry hard, and don't multiplex over HTTP/2.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Intentionally floating: `stable` is a branch ref with no resolvable tag.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      # The default clippy/test above do NOT compile the feature-gated
      # enforcement code (the Docker sandbox backend + the cli sandbox path), so
      # a regression there would otherwise pass CI green. Lint them explicitly.
      - name: Clippy (enforcement features)
        run: |
          cargo clippy -p agentstack-runtime --features docker --all-targets -- -D warnings
          cargo clippy -p agentstack --features sandbox --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Conformance classifier self-test
        run: bash examples/sandbox/conformance-smoke.sh --self-test
      - name: Malicious-repo demo (asserting)
        env:
          AGENTSTACK_BIN: ${{ github.workspace }}/target/release/agentstack
        run: |
          cargo build --release
          bash examples/malicious-repo-demo/run-demo.sh
      # The rest of the asserted example suite — every demo and example
      # project is CI-grade (isolated HOME, PASS/FAIL checks, nonzero exit on
      # failure), so run them all here rather than trusting a manual sweep.
      # The Python MCP clients (lease demo, gateway probe, skills workout) are
      # stdlib-only; the runner's python3 suffices. Reuses the release binary
      # built by the step above.
      - name: Example suite (asserting)
        env:
          AGENTSTACK_BIN: ${{ github.workspace }}/target/release/agentstack
        run: |
          for script in \
            examples/guard-demo/run-demo.sh \
            examples/one-manifest-demo/run-demo.sh \
            examples/mcp-profile-lease/run-demo.sh \
            examples/projects/multi-cli-webapp/assert.sh \
            examples/projects/per-cli-instructions/assert.sh \
            examples/projects/policy-intersection/assert.sh \
            examples/projects/restricted-folders/assert.sh \
            examples/projects/skills-workout/assert.sh \
            examples/projects/locked-run/assert.sh
          do
            echo "::group::$script"
            bash "$script"
            echo "::endgroup::"
          done

  # The flagship security feature — the sandbox + egress proxy + lockdown — only
  # exists behind the `sandbox`/`docker` features and is proven against a real
  # Docker daemon. GitHub's ubuntu runners ship Docker, so run the end-to-end
  # enforcement suite here: a regression that lets a sandboxed container reach a
  # denied host, or that breaks the no-direct-route lockdown, MUST fail CI.
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Intentionally floating: `stable` is a branch ref with no resolvable tag.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Sidecar image + policy enforcement (Docker)
        # The sidecar tests are #[ignore]d to keep the default workspace run
        # fast; this dedicated job is where they actually execute.
        run: cargo test -p agentstack-egress --test sidecar_image -- --include-ignored --nocapture
      - name: Sandbox egress + lockdown end-to-end (Docker)
        run: |
          cargo test -p agentstack --features sandbox \
            --test sandbox_egress \
            --test sandbox_cli_e2e \
            --test sandbox_fs \
            --test sandbox_lockdown \
            --test sandbox_gateway_e2e \
            -- --nocapture
