# Codex CLI adapter descriptor
# Config: ~/.codex/config.toml — [mcp_servers.<name>] tables, TOML. Project
# scope: <repo>/.codex/config.toml, which Codex loads ONLY when the project is
# trusted (projects.<path>.trust_level in the global config — Codex's own
# gate; agentstack renders the file, Codex decides whether to read it).
# Headers go in a nested [mcp_servers.<name>.http_headers] table (not inline).
# Codex has no generic ${VAR} interpolation in MCP fields (env_vars /
# bearer_token_env_var / env_http_headers are the field-specific mechanisms),
# so secrets are written resolved (literal). See docs/design/secret-capabilities.md.
id: codex
display: Codex CLI
detect:
  bin: codex
  config: ~/.codex/config.toml
config:
  path: ~/.codex/config.toml
  format: toml
project:
  config: .codex/config.toml
  format: toml
mcp:
  location: mcp_servers
  fields:
    url: url
    command: command
    args: args
    cwd: cwd
    headers: http_headers
    env: env
  # Codex does not tag transport with a type key; presence of url vs command implies it.
  transport: null
  headers_as_subtable: true
  secret_mode: literal
  # Codex validates server names at startup: ^[a-zA-Z0-9_-]+$. A name like
  # "upstash/context7" renders fine into TOML but fails every Codex launch
  # with "Invalid MCP server name" — skip it at render time instead.
  name_charset: ascii-word-dash
# Skills: Codex reads the cross-tool `.agents/skills` convention — the repo's
# .agents/skills (scanned cwd → repo root) and $HOME/.agents/skills — and
# explicitly follows symlinked skill folders. (~/.codex/skills was never a
# documented location; earlier descriptor versions used it in error.)
skills:
  dir: ~/.agents/skills
  project_dir: .agents/skills
  strategy: symlink
# Headless (prompt-in/text-out) invocation for `run --locked --prompt`:
# `codex exec -- "<prompt>"`. "{prompt}" is replaced as a WHOLE argv element —
# never spliced into another token, never passed through a shell. The literal
# "--" before it is required: it makes Codex treat the prompt as the positional
# PROMPT, so a hostile leading-dash prompt (e.g. "-c sandbox_mode=...") can
# never be parsed as a flag. (Codex hangs on an open stdin in exec mode; the
# launcher always spawns headless runs with stdin closed.)
headless:
  args: ["exec", "--", "{prompt}"]
  # Per-child MCP config injection (W2.5): "{mcp_servers_toml}" is replaced (as
  # a WHOLE argv element, spliced before the "--" guard) with one inline TOML
  # override — `mcp_servers={agentstack = {…}}` — carrying ONLY the agentstack
  # gateway entry. --ignore-user-config is LOAD-BEARING: it is Codex's
  # strict-scope equivalent of Claude's --strict-mcp-config, and the flag —
  # NOT the `-c` override — is what excludes the user's ~/.codex/config.toml
  # servers. A `-c mcp_servers={…}` assignment alone MERGES with the user
  # table (marker-proven live: a decoy server in config.toml still spawns
  # without the flag), so dropping the flag would leak user-scope servers into
  # the child. Note: --ignore-user-config also drops the user's model/approval
  # config (auth still resolves via CODEX_HOME) — acceptable for a governed run.
  # Residual surface (honest limit, witnessed live): codex's account/plugin
  # CONNECTOR layer ("codex_apps" — marketplace-cached, auth-bound connectors)
  # is NOT config-file MCP state, so neither this injection nor
  # --ignore-user-config scopes it, and codex has no per-run off-switch. A
  # governed codex child therefore still carries that un-gated,
  # network-reaching surface; severity is posture-dependent — host-tier
  # --locked leaves the connectors fully live, only --lockdown/egress fences
  # their network reach. The launcher's posture banner states this.
  mcp_injection:
    args: ["--ignore-user-config", "-c", "{mcp_servers_toml}"]
instructions:
  global: ~/.codex/AGENTS.md
  project: AGENTS.md
# Codex supports lifecycle hooks from config.toml. The schema matches the
# Claude-style hooks object: event → [{matcher?, hooks:[{type, command, …}]}].
# Hooks are trust-gated by Codex itself; agentstack only renders the config.
hooks:
  format: toml
  global: ~/.codex/config.toml
  project: .codex/config.toml
  key: hooks
  shape: claude
# Codex keeps settings (model, approval_policy, …) in the same config.toml as
# MCP servers. agentstack owns only the top-level keys you declare under
# [settings.codex]; the [mcp_servers.*] tables and everything else are left as-is.
settings:
  format: toml
  global: ~/.codex/config.toml
  project: .codex/config.toml
  fields:
    - { key: model, type: string, group: General, label: Model, help: "Default model (e.g. gpt-5.5)." }
    - { key: approval_policy, type: enum, options: [untrusted, on-request, never], group: General, label: Approval policy, help: "When Codex pauses before running commands." }
    - { key: sandbox_mode, type: enum, options: [read-only, workspace-write, danger-full-access], group: General, label: Sandbox mode }
    - { key: model_reasoning_effort, type: enum, options: [minimal, low, medium, high], group: General, label: Reasoning effort }
    - { key: web_search, type: enum, options: [cached, live, disabled], group: General, label: Web search }
    - { key: personality, type: enum, options: [friendly, pragmatic, none], group: General, label: Personality }
    - { key: disable_response_storage, type: bool, group: Privacy, label: Disable response storage }
    - { key: hide_agent_reasoning, type: bool, group: Display, label: Hide agent reasoning }
    - { key: file_opener, type: string, group: Display, label: File opener }
    - { key: log_dir, type: string, group: Advanced, label: Log directory }
