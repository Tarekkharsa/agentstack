# Starter capability catalog (registry v0 — embedded in the binary).
# A curated set of well-known MCP servers. Grows into the git-index registry
# (PLAN §9d). `agentstack search <query>` matches name/description/tags.
- name: github
  kind: server
  description: GitHub — issues, pull requests, repositories
  tags: [git, github, vcs, code]
  transport: http
  url: https://api.githubcopilot.com/mcp/
  headers: [Authorization]

- name: gitlab
  kind: server
  description: GitLab — projects, merge requests, issues
  tags: [git, gitlab, vcs, code]
  transport: stdio
  command: npx
  args: ["-y", "@modelcontextprotocol/server-gitlab"]
  env: [GITLAB_TOKEN]

- name: filesystem
  kind: server
  description: Local filesystem — read and write files in allowed dirs
  tags: [files, fs, local]
  transport: stdio
  command: npx
  args: ["-y", "@modelcontextprotocol/server-filesystem"]

- name: postgres
  kind: server
  description: PostgreSQL — query and inspect a database (read-only)
  tags: [db, sql, postgres, database]
  transport: stdio
  command: npx
  args: ["-y", "@modelcontextprotocol/server-postgres"]
  env: [POSTGRES_URL]

- name: slack
  kind: server
  description: Slack — read channels, post messages
  tags: [chat, slack, messaging]
  transport: stdio
  command: npx
  args: ["-y", "@modelcontextprotocol/server-slack"]
  env: [SLACK_BOT_TOKEN]

- name: brave-search
  kind: server
  description: Brave Search — web search results
  tags: [search, web, brave]
  transport: stdio
  command: npx
  args: ["-y", "@modelcontextprotocol/server-brave-search"]
  env: [BRAVE_API_KEY]

- name: linear
  kind: server
  description: Linear — issues, projects, cycles
  tags: [issues, linear, project-management]
  transport: http
  url: https://mcp.linear.app/mcp
  headers: [Authorization]

- name: figma
  kind: server
  description: Figma — read designs and design context
  tags: [design, figma, ui]
  transport: http
  url: https://mcp.figma.com/mcp

# --- Packs (vendor MCP + skill(s) + house rules, installed as one unit) ---
- kind: pack
  name: linear-pack
  display: Linear
  description: "Linear MCP + ticket-breakdown skill + house rules (unofficial, agentstack-authored)"
  homepage: https://linear.app
  tags: [issues, linear, project-management, pack]
  server:
    transport: http
    url: https://mcp.linear.app/mcp
    headers: [Authorization]
  skills:
    - name: linear_breakdown
      path: skills/linear/breakdown
  instructions:
    - name: linear_rules
      path: instructions/linear/rules.md
  targets: ["*"]

- kind: pack
  name: cloudflare-pack
  display: Cloudflare
  description: "Cloudflare MCP + Worker-deploy skill + wrangler cheatsheet + house rules (unofficial, agentstack-authored)"
  homepage: https://developers.cloudflare.com
  tags: [cloudflare, workers, pages, dns, edge, pack]
  server:
    transport: stdio
    command: npx
    args: ["-y", "mcp-remote", "https://bindings.mcp.cloudflare.com/sse"]
  skills:
    - name: cloudflare_ship_worker
      path: skills/cloudflare/ship-worker
    - name: cloudflare_wrangler_cheatsheet
      path: skills/cloudflare/wrangler-cheatsheet
  instructions:
    - name: cloudflare_rules
      path: instructions/cloudflare/rules.md
  targets: ["*"]

- kind: pack
  name: posthog-pack
  display: PostHog
  description: "PostHog MCP + analytics-query skill + house rules (unofficial, agentstack-authored)"
  homepage: https://posthog.com
  tags: [analytics, posthog, product-analytics, experiments, pack]
  server:
    transport: http
    url: https://mcp.posthog.com/mcp
    headers: [Authorization]
  skills:
    - name: posthog_query
      path: skills/posthog/query
    - name: posthog_experiment
      path: skills/posthog/experiment
  instructions:
    - name: posthog_rules
      path: instructions/posthog/rules.md
  targets: ["*"]

# --- Standalone skills (agentstack-authored, bundled) ---
- kind: skill
  name: using-agentstack
  display: Using agentstack
  description: "Teach an agent to operate agentstack itself — manifests, profiles, the three artifact modes, library skill loading, and safe proposal rules"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [agentstack, meta, setup, mcp, skills]
  path: skills/using-agentstack
- kind: skill
  name: finding-skills
  display: Finding skills
  description: "Find and install agent skills — search the library/catalog/registry, pull from any skills repo with add skill, and judge quality by scan verdicts, pins, and provenance"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [agentstack, meta, skills, search, discovery]
  path: skills/finding-skills

- kind: skill
  name: pr-triage
  display: PR Triage
  description: "Triage a stack of open pull requests into review/merge/close buckets (unofficial, agentstack-authored)"
  homepage: https://github.com
  tags: [pr, review, github, triage]
  path: skills/pr-triage

- kind: skill
  name: run-codex
  display: Run Codex (gpt-5.5)
  description: "Delegate clear-spec, bulk, or mechanical work — migrations, codemods, log digs, and independent review — to gpt-5.5 via the Codex CLI, with quota-aware fallback (unofficial, agentstack-authored)"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [codex, gpt, delegation, review, automation, bulk]
  path: skills/run-codex

- kind: skill
  name: sync-library
  display: Sync the central library
  description: "Keep your agentstack central library consistent across machines by versioning ~/.agentstack/lib as a git repo — commit the index + path skills, exclude cache and secrets (unofficial, agentstack-authored)"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [library, sync, git, multi-device, backup]
  path: skills/sync-library

- kind: skill
  name: analyze-usage
  display: Analyze usage
  description: "Report your own token burn from Claude Code transcripts and flag installed-but-unused skills/servers — local, read-only (unofficial, agentstack-authored)"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [analytics, usage, tokens, cleanup, transcripts]
  path: skills/analyze-usage

- kind: skill
  name: route-by-cost
  display: Route by cost
  description: "Pick the right model for each job — bulk work to cheap models, judgment and final review to the strongest — and escalate when output misses the bar (unofficial, agentstack-authored)"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [models, routing, cost, orchestration, delegation]
  path: skills/route-by-cost

- kind: skill
  name: mine-skills
  display: Mine skills from sessions
  description: "Analyze past Claude Code / Codex sessions for recurring failures and re-explained procedures, then distill the top candidates into library skills — local, read-only until approved (unofficial, agentstack-authored)"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [skills, mining, transcripts, sessions, analytics, distill]
  path: skills/mine-skills

- kind: skill
  name: adversarial-review
  display: Adversarial review
  description: "Review a diff as an adversary — assume it's wrong, work from the diff alone, construct concrete failures; the reviewer role for generate-review-fix workflows (unofficial, agentstack-authored)"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [review, workflow, quality, multi-agent, diff]
  path: skills/adversarial-review

- kind: skill
  name: orchestrate-workflow
  display: Orchestrate a workflow
  description: "Wire a generate-review-fix multi-agent workflow from agentstack profiles — roles, models, skills, secrets injected at container start — and run it in sandcastle / Claude Code workflows / Docker; agentstack provisions and governs, the executor runs the loop (unofficial, agentstack-authored)"
  homepage: https://github.com/Tarekkharsa/agentstack
  tags: [workflow, multi-agent, sandbox, docker, orchestration, review]
  path: skills/orchestrate-workflow
