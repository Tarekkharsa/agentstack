<svg width="430" height="120" viewBox="0 0 430 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="agentstack">
  <title>agentstack</title>
  <desc>The agentstack logo: an isometric layer-stack mark beside the wordmark.</desc>
  <defs>
    <linearGradient id="asTop" x1="28" y1="22" x2="92" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5A968"/>
      <stop offset="1" stop-color="#E7864A"/>
    </linearGradient>
    <style>
      .as-word { fill: #23282E; }
      .as-accent { fill: #B4540A; }
      @media (prefers-color-scheme: dark) {
        .as-word { fill: #F3F0EA; }
        .as-accent { fill: #F0975A; }
      }
    </style>
  </defs>

  <!-- mark -->
  <g transform="translate(-6,0)">
    <path d="M60 58 L92 74 L60 90 L28 74 Z" fill="#9E5A1E"/>
    <path d="M28 74 L60 90 L60 99 L28 83 Z" fill="#7E4512"/>
    <path d="M92 74 L60 90 L60 99 L92 83 Z" fill="#64340C"/>
    <path d="M60 40 L92 56 L60 72 L28 56 Z" fill="#CB7433"/>
    <path d="M28 56 L60 72 L60 81 L28 65 Z" fill="#A85618"/>
    <path d="M92 56 L60 72 L60 81 L92 65 Z" fill="#8A4512"/>
    <path d="M60 22 L92 38 L60 54 L28 38 Z" fill="url(#asTop)"/>
    <path d="M28 38 L60 54 L60 63 L28 47 Z" fill="#C56A2E"/>
    <path d="M92 38 L60 54 L60 63 L92 47 Z" fill="#A85618"/>
    <path d="M60 33.5 L69 38 L60 42.5 L51 38 Z" fill="#FDF6EE"/>
    <path d="M60 35.9 L64.5 38 L60 40.1 L55.5 38 Z" fill="#E7864A"/>
  </g>

  <!-- wordmark -->
  <text x="118" y="72" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="42" font-weight="700" letter-spacing="-1.5">
    <tspan class="as-word">agent</tspan><tspan class="as-accent">stack</tspan>
  </text>
</svg>
