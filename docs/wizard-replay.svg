<rect x="36.8" y="49" width="126.0" height="22" class="w0"/></clipPath></defs><rect x="0.5" y="0.5" width="681" height="553" rx="12" fill="#0E1114" stroke="rgba(255,255,255,0.09)"/><rect x="0.5" y="0.5" width="681" height="38" rx="12" fill="rgba(255,255,255,0.02)"/><rect x="0.5" y="28" width="681" height="10" fill="#0E1114"/><line x1="0.5" y1="38" x2="681.5" y2="38" stroke="rgba(255,255,255,0.07)"/><circle cx="22" cy="19" r="5.5" fill="#E5786B"/><circle cx="40" cy="19" r="5.5" fill="#E0B04A"/><circle cx="58" cy="19" r="5.5" fill="#7CC08B"/><text x="662" y="23" text-anchor="end" fill="#97A1AD" style="font-size:12px;font-weight:700">the guided init: plan · storage · mode · apply</text><g class="q0"><text x="20.0" y="66" fill="#F0975A" class="p" textLength="16.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >$ </text><text x="36.8" y="66" fill="#D7DEE4" clip-path="url(#tc0)" textLength="126.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve">agentstack init</text></g><g class="q1"><text x="20.0" y="88" fill="#D7DEE4" textLength="92.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >Setup will:</text></g><g class="q2"><text x="20.0" y="110" fill="#D7DEE4" textLength="352.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  1. detect the agent CLIs on this machine</text></g><g class="q3"><text x="20.0" y="132" fill="#D7DEE4" textLength="285.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  2. import their existing configs</text></g><g class="q4"><text x="20.0" y="154" fill="#D7DEE4" textLength="420.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  3. lift any inline tokens to ${REF} placeholders</text></g><g class="q5"><text x="20.0" y="176" fill="#D7DEE4" textLength="285.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  4. write one agentstack manifest</text></g><g class="q6"><text x="20.0" y="198" fill="#97A1AD" textLength="588.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >· Nothing is written until you confirm. Your CLIs are not touched yet.</text></g><g class="q7"><text x="20.0" y="220" fill="#D7DEE4" textLength="8.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > </text></g><g class="q8"><text x="20.0" y="242" fill="#97A1AD" textLength="596.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >🔍  6 CLI binaries on PATH: Claude Code · Codex · Gemini · OpenCode · Pi</text></g><g class="q9"><text x="20.0" y="264" fill="#97A1AD" textLength="411.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >📥  Imported 1 MCP server(s) from existing configs</text></g><g class="q10"><text x="20.0" y="286" fill="#97A1AD" textLength="537.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >🔐  Found 1 plaintext token in your live CLI configs — lifted to </text><text x="557.6" y="286" fill="#7CC08B" textLength="75.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >${GH_PAT}</text></g><g class="q11"><text x="20.0" y="308" fill="#D7DEE4" textLength="352.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >? Where should these token values live? › </text><text x="372.8" y="308" fill="#7CC08B" textLength="184.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >Project .env (default)</text></g><g class="q12"><text x="20.0" y="330" fill="#97A1AD" textLength="336.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >    macOS keychain · Skip / decide later</text></g><g class="q13"><text x="20.0" y="352" fill="#D7DEE4" textLength="210.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >? Pick a delivery mode › </text><text x="230.0" y="352" fill="#7CC08B" textLength="50.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >static</text><text x="280.4" y="352" fill="#97A1AD" textLength="369.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > — rendered configs on disk, kept out of git</text></g><g class="q14"><text x="20.0" y="374" fill="#97A1AD" textLength="252.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >    clean-at-rest · zero-files</text></g><g class="q15"><text x="20.0" y="396" fill="#97A1AD" textLength="478.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  → preview · confirm · install · apply · skills · doctor</text></g><g class="q16"><text x="20.0" y="418" fill="#D7DEE4" textLength="8.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > </text></g><g class="q17"><text x="20.0" y="440" fill="#97A1AD" textLength="260.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  Claude Code  + .mcp.json     </text><text x="280.4" y="440" fill="#7CC08B" textLength="134.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >✓ wrote 1 server</text></g><g class="q18"><text x="20.0" y="462" fill="#97A1AD" textLength="260.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  Codex CLI    + config.toml   </text><text x="280.4" y="462" fill="#7CC08B" textLength="134.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >✓ wrote 1 server</text></g><g class="q19"><text x="20.0" y="484" fill="#7CC08B" textLength="8.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >✓</text><text x="28.4" y="484" fill="#D7DEE4" textLength="134.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > Setup complete.</text><text x="162.8" y="484" fill="#97A1AD" textLength="352.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > · undo: agentstack restore --last --write</text></g><g class="q20"><text x="20.0" y="506" fill="#D7DEE4" textLength="562.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >Learn the rest: https://tarekkharsa.github.io/agentstack/start.html</text></g><g class="q21"><text x="20.0" y="528" fill="#D7DEE4" textLength="428.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  — or run `agentstack` anytime for your next step.</text></g><rect class="cur" x="452.4" y="515" width="7" height="16" fill="#7CC08B"/></svg>