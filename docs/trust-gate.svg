imation:q6 13.992s linear infinite}@keyframes q6{0%,44.168%{opacity:0}44.178%,99.5%{opacity:1}100%{opacity:0}}.q7{opacity:0;animation:q7 13.992s linear infinite}@keyframes q7{0%,47.742%{opacity:0}47.751999999999995%,99.5%{opacity:1}100%{opacity:0}}.q8{opacity:0;animation:q8 13.992s linear infinite}@keyframes q8{0%,50.172%{opacity:0}50.181999999999995%,99.5%{opacity:1}100%{opacity:0}}.q9{opacity:0;animation:q9 13.992s linear infinite}@keyframes q9{0%,56.604%{opacity:0}56.614%,99.5%{opacity:1}100%{opacity:0}}.q10{opacity:0;animation:q10 13.992s linear infinite}@keyframes q10{0%,60.177%{opacity:0}60.187%,99.5%{opacity:1}100%{opacity:0}}.w10{animation:w10 13.992s linear infinite}@keyframes w10{0%,60.177%{width:0;animation-timing-function:steps(19,end)}63.979%,99.5%{width:159.6px}100%{width:0}}.cc10{opacity:0;animation:cc10 13.992s linear infinite}@keyframes cc10{0%,63.979%{opacity:0}63.989%,99.5%{opacity:1}100%{opacity:0}}.q11{opacity:0;animation:q11 13.992s linear infinite}@keyframes q11{0%,66.838%{opacity:0}66.848%,99.5%{opacity:1}100%{opacity:0}}.q12{opacity:0;animation:q12 13.992s linear infinite}@keyframes q12{0%,71.841%{opacity:0}71.851%,99.5%{opacity:1}100%{opacity:0}}.cur{opacity:0;animation:curon 13.992s linear infinite, blink 1.1s steps(2,start) infinite}@keyframes curon{0%,71.841%{opacity:0}71.851%,99.5%{opacity:1}100%{opacity:0}}</style><defs><clipPath id="tc0"><rect x="36.8" y="49" width="319.2" height="22" class="w0"/></clipPath><clipPath id="tc1"><rect x="36.8" y="71" width="243.6" height="22" class="w1"/></clipPath><clipPath id="tc4"><rect x="36.8" y="137" width="151.2" height="22" class="w4"/></clipPath><clipPath id="tc10"><rect x="36.8" y="269" width="159.6" height="22" class="w10"/></clipPath></defs><rect x="0.5" y="0.5" width="723" height="355" rx="12" fill="#0E1114" stroke="rgba(255,255,255,0.09)"/><rect x="0.5" y="0.5" width="723" height="38" rx="12" fill="rgba(255,255,255,0.02)"/><rect x="0.5" y="28" width="723" height="10" fill="#0E1114"/><line x1="0.5" y1="38" x2="723.5" y2="38" stroke="rgba(255,255,255,0.07)"/><circle cx="22" cy="19" r="5.5" fill="#E5786B"/><circle cx="40" cy="19" r="5.5" fill="#E0B04A"/><circle cx="58" cy="19" r="5.5" fill="#7CC08B"/><text x="704" y="23" text-anchor="end" fill="#97A1AD" style="font-size:12px;font-weight:700">clone → inert → trust → firewalled → audited</text><g class="q0"><text x="20.0" y="66" fill="#F0975A" class="p" textLength="16.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >$ </text><text x="36.8" y="66" fill="#D7DEE4" clip-path="url(#tc0)" textLength="319.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve">git clone acme/the-repo &amp;&amp; cd the-repo</text><text x="356.0" y="66" fill="#97A1AD" textLength="210.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve" class="cc0" >   # declares MCP servers</text></g><g class="q1"><text x="20.0" y="88" fill="#F0975A" class="p" textLength="16.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >$ </text><text x="36.8" y="88" fill="#D7DEE4" clip-path="url(#tc1)" textLength="243.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve">agentstack mcp --auto-project</text><text x="280.4" y="88" fill="#97A1AD" textLength="336.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve" class="cc1" >              # the agent asks for tools</text></g><g class="q2"><text x="20.0" y="110" fill="#E5786B" textLength="562.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  ✗ not trusted — none of its servers are spawned or even contacted</text></g><g class="q3"><text x="20.0" y="132" fill="#D7DEE4" textLength="8.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > </text></g><g class="q4"><text x="20.0" y="154" fill="#F0975A" class="p" textLength="16.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >$ </text><text x="36.8" y="154" fill="#D7DEE4" clip-path="url(#tc4)" textLength="151.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve">agentstack trust .</text><text x="188.0" y="154" fill="#97A1AD" textLength="428.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" class="cc4" >                         # you review, then consent</text></g><g class="q5"><text x="20.0" y="176" fill="#7CC08B" textLength="25.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  ✓</text><text x="45.2" y="176" fill="#D7DEE4" textLength="235.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > trusted at sha256:c7d5858e…</text></g><g class="q6"><text x="20.0" y="198" fill="#D7DEE4" textLength="8.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > </text></g><g class="q7"><text x="20.0" y="220" fill="#97A1AD" textLength="193.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  demo__echo &quot;hi&quot;      </text><text x="213.2" y="220" fill="#7CC08B" textLength="33.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >✓ ok</text><text x="246.8" y="220" fill="#97A1AD" textLength="201.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >       brokered, audited</text></g><g class="q8"><text x="20.0" y="242" fill="#97A1AD" textLength="193.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  demo__secret_read    </text><text x="213.2" y="242" fill="#E5786B" textLength="75.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >✗ refused</text><text x="288.8" y="242" fill="#97A1AD" textLength="302.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  [policy.tools] rule &quot;!secret_read&quot;</text></g><g class="q9"><text x="20.0" y="264" fill="#D7DEE4" textLength="8.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > </text></g><g class="q10"><text x="20.0" y="286" fill="#F0975A" class="p" textLength="16.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >$ </text><text x="36.8" y="286" fill="#D7DEE4" clip-path="url(#tc10)" textLength="159.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve">agentstack lib sync</text><text x="196.4" y="286" fill="#97A1AD" textLength="495.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve" class="cc10" >                        # library → git, machine to machine</text></g><g class="q11"><text x="20.0" y="308" fill="#E5786B" textLength="554.4" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  ✗ refusing to sync — &#x27;Authorization&#x27; looks like a literal secret</text></g><g class="q12"><text x="20.0" y="330" fill="#7CC08B" textLength="25.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve" >  ✓</text><text x="45.2" y="330" fill="#97A1AD" textLength="613.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve" > make it a ${REF} and it travels safely — values never leave the keychain</text></g><rect class="cur" x="662.4" y="317" width="7" height="16" fill="#7CC08B"/></svg>