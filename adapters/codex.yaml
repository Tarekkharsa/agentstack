# Codex CLI adapter descriptor
# Config: ~/.codex/config.toml — [mcp_servers.<name>] tables, TOML.
# Headers go in a nested [mcp_servers.<name>.http_headers] table (not inline).
# Codex has no ${VAR:-default} expansion, so secrets are written resolved (literal).
id: codex
display: Codex CLI
detect:
  bin: codex
  config: ~/.codex/config.toml
config:
  path: ~/.codex/config.toml
  format: toml
mcp:
  location: mcp_servers
  fields:
    url: url
    command: command
    args: args
    headers: http_headers
    env: env
  # Codex does not tag transport with a type key; presence of url vs command implies it.
  transport: null
  headers_as_subtable: true
  secret_mode: literal
# Codex has no per-directory project config file today, so it is global-only
# (no `project:` block). Skills live under the global Codex skills dir.
skills:
  dir: ~/.codex/skills
  strategy: symlink
instructions:
  global: ~/.codex/AGENTS.md
  project: AGENTS.md
# Codex keeps settings (model, approval_policy, …) in the same config.toml as
# MCP servers. agentstack owns only the top-level keys you declare under
# [settings.codex]; the [mcp_servers.*] tables and everything else are left as-is.
settings:
  format: toml
  global: ~/.codex/config.toml
  fields:
    - { key: model, type: string, group: General, label: Model, help: "Default model (e.g. gpt-5.5)." }
    - { key: approval_policy, type: enum, options: [untrusted, on-request, never], group: General, label: Approval policy, help: "When Codex pauses before running commands." }
    - { key: sandbox_mode, type: enum, options: [read-only, workspace-write, danger-full-access], group: General, label: Sandbox mode }
    - { key: model_reasoning_effort, type: enum, options: [minimal, low, medium, high], group: General, label: Reasoning effort }
    - { key: web_search, type: enum, options: [cached, live, disabled], group: General, label: Web search }
    - { key: personality, type: enum, options: [friendly, pragmatic, none], group: General, label: Personality }
    - { key: disable_response_storage, type: bool, group: Privacy, label: Disable response storage }
    - { key: hide_agent_reasoning, type: bool, group: Display, label: Hide agent reasoning }
    - { key: file_opener, type: string, group: Display, label: File opener }
    - { key: log_dir, type: string, group: Advanced, label: Log directory }
